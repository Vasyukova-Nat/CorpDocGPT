name: CI/CD for CorpDocGPT

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  release:
    types: [published]

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: true

jobs:
  test-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt
    
    - name: Install Python dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio
    
    - name: Run Python tests
      run: |
        cd backend
        python -m pytest tests/ -v || echo "No tests found - continuing"
    
    - name: Check Python syntax
      run: |
        cd backend
        python -m py_compile app.py rag_system/rag_service.py

  test-frontend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci
    
    - name: Type check
      run: |
        cd frontend
        npx tsc --noEmit
    
    - name: Build frontend
      run: |
        cd frontend
        npm run build

  lint-code:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install linting tools
      run: |
        pip install flake8 black isort
    
    - name: Lint Python code with flake8
      run: |
        cd backend
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Check Python formatting with black
      run: |
        cd backend
        black --check . || true

  build-windows:
    runs-on: windows-latest
    needs: [test-backend, test-frontend, lint-code]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        targets: x86_64-pc-windows-msvc
    
    - name: Install backend dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build backend executable
      run: |
        cd backend
        pyinstaller --onefile --name=CorpDocGPT_backend --add-data="rag_system;rag_system" app.py
      env:
        PYTHONUTF8: 1
    
    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci
    
    - name: Build Tauri application
      run: |
        cd frontend
        npm run tauri build
    
    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: |
          frontend/src-tauri/target/release/*.exe
          backend/dist/*.exe
        retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, lint-code]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        targets: x86_64-unknown-linux-gnu
    
    - name: Install system dependencies for Tauri
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.0-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
    
    - name: Install backend dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci
    
    - name: Build Tauri application for Linux
      run: |
        cd frontend
        npm run tauri build
    
    - name: Upload Linux artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-build
        path: frontend/src-tauri/target/release/
        retention-days: 30

  create-release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    if: github.event_name == 'release' && github.event.action == 'published'
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
    
    - name: Display structure of downloaded files
      run: ls -R
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          windows-build/*.exe
          linux-build/corpdocgptdesktop
        body: |
          # CorpDocGPT Release
          
          ## Desktop AI Assistant for MTUCI
          
          ### System Requirements
          - **Windows**: Windows 10/11
          - **Linux**: Ubuntu 20.04+, CentOS 8+
          - **RAM**: 8GB+ recommended
          - **Storage**: 2GB free space
          
          ### Installation
          1. Download the executable for your platform
          2. Ensure Ollama is installed and running
          3. Launch the application
          
          ### Features
          - Local document processing
          - AI-powered Q&A
          - Secure corporate knowledge base
        draft: false
        prerelease: false

  deploy-docs:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs
        force_orphan: true